name: Build and Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Write version.h from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          MINOR=$(echo "$TAG" | cut -d. -f2)
          PATCH=$(echo "$TAG" | cut -d. -f3)
          BUILD=$(echo "$TAG" | grep -oP '(?<=-)\d+$' || echo "0")
          cat > version.h << EOF
          #ifndef F4MENU_VERSION_H
          #define F4MENU_VERSION_H
          #define F4MENU_VERSION_A L"$TAG"
          #define F4MENU_VER_MAJOR $MAJOR
          #define F4MENU_VER_MINOR $MINOR
          #define F4MENU_VER_PATCH $PATCH
          #define F4MENU_VER_BUILD $BUILD
          #endif
          EOF

      - name: Build x64
        run: msbuild F4Menu.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal

      - name: Build Win32
        run: msbuild F4Menu.vcxproj /p:Configuration=Release /p:Platform=Win32 /v:minimal

      - name: Package
        shell: bash
        run: |
          7z a "F4Menu-${{ github.ref_name }}.zip" F4Menu.exe F4Menu.ini F4Menu.ico

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ github.ref_name }}
          files: F4Menu-${{ github.ref_name }}.zip
          generate_release_notes: true
